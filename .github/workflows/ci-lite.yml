name: Aurik CI Lite

on:
  push:
    branches:
      - main
      - clean/**
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  normative-guard:
    name: Normative Guard (No Production Stubs)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements/requirements_dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements_dev.txt

      - name: Run normative CI guard tests
        run: |
          python -m pytest tests/normative/test_no_production_stubs.py \
            -p no:xdist \
            --override-ini="addopts=--strict-markers --import-mode=importlib" \
            --timeout=30 \
            --tb=short \
            -q \
            --disable-warnings \
            --no-header
