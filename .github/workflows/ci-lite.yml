name: Aurik CI Lite

on:
  push:
    branches:
      - main
      - clean/**
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  pr-evidence-gate:
    name: PR Evidence Gate (Spec Changes)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require evidence block for spec changes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed_specs="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '^.github/specs/' || true)"
          if [[ -z "$changed_specs" ]]; then
            echo "No spec changes detected; evidence gate skipped."
            exit 0
          fi

          echo "Spec changes detected:"
          echo "$changed_specs"

          missing=0
          for token in "## Evidenzblock" "Seed" "95 %-CI" "Maintainer Sign-off"; do
            if ! grep -Fq "$token" <<< "$PR_BODY"; then
              echo "Missing PR body token: $token"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Spec changes require a complete evidence block in PR description."
            echo "Template: docs/guides/SPEC_EVIDENZBLOCK_TEMPLATE.md"
            exit 1
          fi

  determinism-gate:
    name: Determinism Gate (Normative)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements/requirements_dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements_dev.txt
          pip install numpy==1.26.4

      - name: Run deterministic normative tests
        run: |
          python -m pytest \
            tests/normative/test_full_pipeline_determinism.py \
            tests/normative/test_p2_audit_and_deployment_mode.py \
            -p no:xdist \
            --override-ini="addopts=--strict-markers --import-mode=importlib" \
            --timeout=30 \
            --tb=short \
            -q \
            --disable-warnings \
            --no-header

  normative-guard:
    name: Normative Guard (No Production Stubs)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements/requirements_dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements_dev.txt
          # tests/conftest.py imports numpy, so install it explicitly for the guard run.
          pip install numpy==1.26.4
          # tests/test_utils.py imports scipy.signal for fixture utilities.
          pip install scipy==1.15.3

      - name: Run normative CI guard tests
        run: |
          python -m pytest tests/normative/test_no_production_stubs.py \
            -p no:xdist \
            --override-ini="addopts=--strict-markers --import-mode=importlib" \
            --timeout=30 \
            --tb=short \
            -q \
            --disable-warnings \
            --no-header

      - name: VERBOTEN-Regeln Compliance-Check
        run: |
          python scripts/compliance_check.py --errors-only
