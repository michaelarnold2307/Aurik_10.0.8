profile:
  name: dat_medium_offline_stereo
  medium: dat
  mode: offline
  channels: stereo

analysis:
  segment_length_sec: 1.5
  segment_overlap_sec: 0.5
  decision_smoothing_sec: 8.0

budgets:
  artifact_budget: 0.08
  identity_budget: 0.06
  temporal_change_budget: 0.05
  spectral_change_budget: 0.10
  noise_change_budget: 0.02
  stereo_change_budget: 0.05

processing_order:
  - dropout_repair
  - click_repair
  - declip
  - stereo_guard
  - finalize

modules:

  dropout_repair:
    detect:
      hard_mute_dbfs: -90.0
      min_duration_ms: 8
      soft_drop_db: -30.0
      soft_drop_max_ms: 30
      zero_hold_min_ms: 3
    trial:
      repair_wet: 1.0
    commit:
      min_anchor_gain: 0.015

  click_repair:
    detect:
      sample_diff_threshold: 0.40
      max_duration_ms: 1.0
    trial:
      wet: 1.0
    commit:
      min_anchor_gain: 0.010

  declip:
    detect:
      pct_samples_above_minus_0_2dbfs_warn: 0.30
      pct_samples_above_minus_0_2dbfs_strong: 1.00
      true_peak_warn_dbTP: -0.2
    trial:
      strength_warn: 0.20
      strength_strong: 0.35
      strength_max: 0.40
    commit:
      min_anchor_gain: 0.015
      max_true_peak_dbTP: -1.0

  stereo_guard:
    rms_diff_warn_db: 1.5
    hf_diff_warn_db: 3.0
    mono_fold_max_regression_db: 0.0

finalize:
  true_peak_guard:
    enabled: true
    target_dbTP: -1.0
