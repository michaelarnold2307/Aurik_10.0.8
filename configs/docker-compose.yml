# LEGACY — Docker-Compose nur für Entwickler-Referenz behalten.
# Aurik 9 operiert vollständig standalone via lokalem ONNX (onnxruntime).
# Kein Docker für Endnutzer erforderlich.
version: '3.8'

services:
  aurik-backend:
    build: .
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "8000:8000"

  deepfilternet:
    build: ./Aurik_Standalone/models/deepfilternet_v3_ll
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "5001:5001"

  dccrn:
