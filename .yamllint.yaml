extends: default
rules:
  line-length: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start: disable
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  truthy:
    allowed-values: ["true", "false", "yes", "no", "on", "off"]
    check-keys: false
  indentation: disable
