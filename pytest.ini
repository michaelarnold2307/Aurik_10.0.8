[pytest]
norecursedirs = .git __pycache__ build dist .venv* visqol/* models/deepfilternet_v3_ii/DeepFilterNet/tests tests_legacy
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*SwigPyPacked.*:DeprecationWarning
    ignore:.*SwigPyObject.*:DeprecationWarning
    # --- Drittbibliothek-Warnings (edge-case Testeingaben, kein Handlungsbedarf) ---
    # numpy: Divide-by-zero / leere Slices bei kurzen synthetischen Testaudios
    ignore::RuntimeWarning:numpy
    # scipy: nperseg/n_fft > Eingabelänge (kurze Testclips), Filterdesign-Grenzfälle
    ignore::RuntimeWarning:scipy
    ignore:nperseg.*is greater than input length:UserWarning:scipy
    # librosa: n_fft größer als Signal / leere Frequenzmengen bei Stille/kurzen Clips
    ignore:n_fft=.*is too large for input signal:UserWarning:librosa
    ignore:Trying to estimate tuning from empty frequency set:UserWarning:librosa
    # librosa: nutzt pkg_resources (Drittbibliothek-intern, auch in librosa 0.11.0 nicht behoben)
    ignore:pkg_resources is deprecated as an API:UserWarning
    # timm: bekannte Deprecation-Warnung im Layer-Importpfad
    ignore:Importing from timm\.models\.layers is deprecated, please import via timm\.layers:FutureWarning
    ignore:Importing from timm\.models\.layers is deprecated:FutureWarning
    # torch: bekannte meshgrid-API-Vorwarnung in Drittbibliothekspfad
    ignore:torch\.meshgrid: in an upcoming release, it will be required to pass the indexing argument\.:UserWarning
    ignore:torch\.meshgrid:UserWarning
    # Hypothesis-Plugin: norecursedirs schließt .hypothesis aus (strukturell, 1× pro Session)
    ignore:Skipping collection of.*hypothesis.*norecursedirs:UserWarning
    # torchaudio / DeepFilterNet: AudioMetaData-Pfad veraltet (Drittbibliothek, kein eigenr Code)
    ignore:.*AudioMetaData.*has been moved:UserWarning
    # demucs: unclosed file handle in repo.py (yaml.safe_load(open(...))) — Drittbibliothek
    ignore::ResourceWarning:demucs
    ignore:Professional meters not available:UserWarning
    ignore:NOLA condition failed:UserWarning
markers =
    unit: Unit-Tests (schnell, isoliert)
    slow: markiert langsame Tests
    ml: Tests die ML-Modelle laden (können langsam sein)
    integration: Integrationstests
    e2e: End-to-End-Tests
    musical_goals: Tests für 7 Musical Goals (Brillanz, Wärme, etc.)
    adaptive_thresholds: Tests für Adaptive Threshold System (Material Quality-aware)
    material_quality: Tests für Material Quality Assessment (Generation-Count weighted)
    vocal_enhancement: Tests für Vocal Enhancement (De-Essing, gender-spezifisch)
    forensic_analysis: Tests für Forensic Analysis (Medium Detection, Era Detection, 30+ Tonträger)
    transfer_chain: Tests für Tonträgerketten-Erkennung (Multi-Generation)
    benchmark: Performance-Benchmark-Tests (pytest-benchmark oder manuell)
    xdist_group: Tests die in derselben xdist-Gruppe laufen sollen
    anyio: Asynchrone Tests mit anyio
    amrb: AMRB CI-Gate Tests (OS-Führerschaft ≥84.0, ≥8/10 Szenarien) — §8.1
    competitive: Wettbewerber-Vergleich CI-Gate (Aurik ≥ iZotope in ≥7/10) — §8.2 Punkt 11
    normative: Normative CI-Guard-Tests (Spec-Compliance, Stub-Erkennung, Code-Qualität)

# Coverage settings
# addopts = --cov=. --cov-config=.coveragerc --cov-report=html --cov-report=term-missing

# Performance: -n 2 verhindert xdist-Deadlocks bei Singleton-Initialisierung (ML-Modelle, Locks)
# -n auto auf Systemen mit vielen Cores führt zu Race Conditions bei threading.Lock()-Singletons
#
# ┌── VS Code Test Explorer (settings.json) ──────────────────────────────────────────┐
# │  Läuft NUR auf tests/unit/ (50 Dateien, ~600 Tests)                               │
# │  Überschreibt addopts mit: -p no:xdist --override-ini=addopts=... --timeout=30    │
# │  GRUND: 5 200+ Nachrichten via TEST_RUN_PIPE → Extension-Host-Absturz              │
# │                                                                                    │
# │  Vollsuite → Terminal → Strg+Shift+B → "pytest: Vollsuite (2 Worker, Terminal)"   │
# │  Integrations-Tests → Terminal → tasks.json → "pytest: Integrations-Tests"        │
# └────────────────────────────────────────────────────────────────────────────────────┘
addopts = --strict-markers -ra -n 2 --timeout=60 --dist=loadfile --import-mode=importlib -p no:hydra_pytest

# Stdout/Stderr pro Test auf 10 kB begrenzen — verhindert Output-Buffer-Overflow
# in VS Code und bei xdist-Worker-Aggregation
log_cli = false
log_level = WARNING