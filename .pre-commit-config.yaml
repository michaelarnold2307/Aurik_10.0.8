# =============================================================================
# .pre-commit-config.yaml — Aurik 9 Code-Qualitäts-Hooks (SOTA, März 2026)
# Installation: pre-commit install
# Manuell ausführen: pre-commit run --all-files
# =============================================================================

default_language_version:
  python: python3.10

exclude: |
  (?x)^(
    models/.*|
    \.venv_aurik/.*|
    build/.*|
    dist/.*|
    output_audio/.*|
    sessions/.*|
    logs/.*|
    data/.*|
    golden_samples/.*|
    chain_templates/.*|
    configs/.*
  )$

repos:
  # ---------------------------------------------------------------------------
  # 1. Standard pre-commit Hooks (Basisqualität)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: ^\.vscode/
      - id: check-ast              # Python-Syntax vorab prüfen
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: debug-statements       # kein breakpoint() oder pdb in Produktion
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch=main, --branch=release]
      - id: pretty-format-json
        args: [--autofix, --indent=2]
        exclude: '^(\.vscode/|analysis_results/)'

  # ---------------------------------------------------------------------------
  # 2. Black — DEAKTIVIERT (Konflikt mit ruff-format; ruff-format ist black-kompatibel)
  # ---------------------------------------------------------------------------
  # - repo: https://github.com/psf/black
  #   rev: 26.1.0
  #   hooks:
  #     - id: black
  #       language_version: python3.10
  #       args: [--line-length=120]

  # ---------------------------------------------------------------------------
  # 3. isort — DEAKTIVIERT (Import-Sortierung via ruff)
  # ---------------------------------------------------------------------------
  # - repo: https://github.com/PyCQA/isort
  #   rev: 6.0.1
  #   hooks:
  #     - id: isort
  #       args: [--profile=black, --line-length=120]

  # ---------------------------------------------------------------------------
  # 4. Ruff — Schneller Linter (ersetzt Flake8 + Pylint weitgehend)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
          # ruff-format als Black-Alternative (nur für zusätzliche Prüfungen)

  # ---------------------------------------------------------------------------
  # 5. Autoflake — Unnötige Imports und Variablen entfernen
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --expand-star-imports
          - --ignore-init-module-imports

  # ---------------------------------------------------------------------------
  # 6. PyUpgrade — Modernisierung auf Python 3.10+
  # ---------------------------------------------------------------------------
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  # ---------------------------------------------------------------------------
  # 7. Flake8 — PEP-8 und Stil-Prüfung
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-bugbear>=24.0.0
          - flake8-comprehensions>=3.15.0
          - flake8-simplify>=0.21.0
          - flake8-docstrings>=1.7.0
          - pep8-naming>=0.14.0
        args: [--config=.flake8]

  # ---------------------------------------------------------------------------
  # 8. Mypy — Statische Typprüfung
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-PyYAML
          - types-setuptools
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --show-error-codes
          - --follow-imports=silent
          - --disable-error-code=misc
          - --disable-error-code=no-any-return
          - --disable-error-code=attr-defined
          - --disable-error-code=func-returns-value
          - --disable-error-code=list-item
          - --disable-error-code=arg-type
          - --disable-error-code=var-annotated
          - --disable-error-code=assignment
          - --disable-error-code=no-redef
          - --disable-error-code=index
          - --disable-error-code=union-attr
          - --disable-error-code=return
          - --disable-error-code=dict-item
        # Nur Kern-Module prüfen (schnell genug für pre-commit)
        files: ^(core|dsp|plugins|denker)/

  # ---------------------------------------------------------------------------
  # 9. Bandit — Sicherheits-Scan (OWASP Top 10)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args:
          - --recursive
          - --severity-level=medium
          - --confidence-level=medium
          - --exclude=tests,benchmarks,scripts
          - --skip=B101,B311,B603,B607,B614
        files: ^(core|dsp|plugins|backend|denker)/

  # ---------------------------------------------------------------------------
  # 10. Markdownlint — Markdown-Qualität
  # ---------------------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.json, --fix]
        exclude: |
          (?x)^(
            docs/.*|
            CHANGELOG.md|
            .github/copilot-instructions.md|
            benchmarks/competitive/.*
          )$

  # ---------------------------------------------------------------------------
  # 11. YAML-Lint — YAML-Qualität
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  # ---------------------------------------------------------------------------
  # 12. Prettier — JSON-Formatierung
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '\.json$'
        exclude: '^(models/|audit/|sessions/|logs/|analysis_results/)'

  # ---------------------------------------------------------------------------
  # 13. Lokale Hooks — Projekt-spezifische Validierungen
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: no-production-stubs
        name: "⚠️ Keine NotImplementedError-Stubs in Produktion"
        entry: .venv_aurik/bin/python -m pytest tests/normative/test_no_production_stubs.py -x -q
        language: system
        pass_filenames: false
        files: ^(core|dsp|plugins|backend|denker)/.*\.py$

      - id: musical-goals-thresholds
        name: "🎵 Musical-Goals-Schwellwerte unverandert"
        entry: .venv_aurik/bin/python scripts/check_musical_goals.py
        language: system
        pass_filenames: false
        files: ^backend/core/musical_goals/

      - id: aurik-compliance
        name: "🚫 Aurik VERBOTEN-Regeln (copilot-instructions §VERBOTEN)"
        entry: .venv_aurik/bin/python scripts/compliance_check.py --errors-only
        language: system
        pass_filenames: false
        files: ^(backend|core|dsp|plugins|denker|Aurik910)/.*\.py$

      - id: aurik-verboten-linter
        name: "🔍 Aurik AST VERBOTEN-Linter (V01–V12)"
        entry: .venv_aurik/bin/python scripts/aurik_verboten_linter.py backend/ plugins/
        language: system
        pass_filenames: false
        files: ^(backend|plugins)/.*\.py$

      - id: aurik-stash-drift-guard
        name: "📦 Aurik Stash-Drift-Guard (verhindert Snapshot-Akkumulation)"
        entry: "bash -c 'count=$(git stash list | wc -l); if [ \"$count\" -gt 2 ]; then echo \"WARNUNG: $count Stashes vorhanden. Vor Commit aufloesen: git stash drop oder git stash pop.\"; exit 1; fi; files=$(git stash show 2>/dev/null | tail -1 | awk \"{print \\$1}\"); if [ \"${files:-0}\" -gt 50 ]; then echo \"WARNUNG: Aktiver Stash hat $files Dateien (Snapshot-Drift). Vor Commit mit HEAD abgleichen.\"; exit 1; fi; exit 0'"
        language: system
        pass_filenames: false
        always_run: true
