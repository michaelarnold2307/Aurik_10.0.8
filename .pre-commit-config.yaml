# =============================================================================
# .pre-commit-config.yaml  Aurik 10 Code-Qualitäts-Hooks (SOTA, Juli 2026)
# Installation: pre-commit install && pre-commit install --hook-type commit-msg
# Manuell ausführen: pre-commit run --all-files
# =============================================================================

default_language_version:
  python: python3.10

exclude: |
  (?x)^(
    models/.*|
    \.venv_aurik/.*|
    build/.*|
    dist/.*|
    output_audio/.*|
    sessions/.*|
    logs/.*|
    data/.*|
    golden_samples/.*|
    chain_templates/.*|
    configs/.*
  )$

repos:
  # ---------------------------------------------------------------------------
  # 1. Standard pre-commit Hooks (Basisqualität)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: ^\.vscode/
      - id: check-ast
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: debug-statements
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch=release]
      - id: pretty-format-json
        args: [--autofix, --indent=2]
        exclude: '^(\.vscode/|analysis_results/)'

  # ---------------------------------------------------------------------------
  # 2. Ruff — Schneller Linter + Formatter (ersetzt Black, isort, autoflake)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # 3. PyUpgrade — Modernisierung auf Python 3.10+
  # ---------------------------------------------------------------------------
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  # ---------------------------------------------------------------------------
  # 4. Flake8 — PEP-8 + Plugins (bugbear, comprehensions, simplify, naming)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-bugbear>=24.0.0
          - flake8-comprehensions>=3.15.0
          - flake8-simplify>=0.21.0
          - flake8-docstrings>=1.7.0
          - pep8-naming>=0.14.0
        args: [--config=.flake8]

  # ---------------------------------------------------------------------------
  # 5. Mypy — Statische Typprüfung
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-PyYAML
          - types-setuptools
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --show-error-codes
          - --follow-imports=silent
          - --explicit-package-bases
          - --disable-error-code=misc
          - --disable-error-code=no-any-return
          - --disable-error-code=attr-defined
          - --disable-error-code=func-returns-value
          - --disable-error-code=list-item
          - --disable-error-code=arg-type
          - --disable-error-code=var-annotated
          - --disable-error-code=assignment
          - --disable-error-code=no-redef
          - --disable-error-code=index
          - --disable-error-code=union-attr
          - --disable-error-code=return
          - --disable-error-code=dict-item
          - --disable-error-code=override
        files: ^(backend|plugins|denker)/.*\.py$

  # ---------------------------------------------------------------------------
  # 6. Bandit — Sicherheits-Scan (OWASP Top 10)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args:
          - --recursive
          - --severity-level=medium
          - --confidence-level=medium
          - --exclude=tests,benchmarks,scripts
          - --skip=B101,B311,B603,B607,B614
        files: ^(core|dsp|plugins|backend|denker)/

  # ---------------------------------------------------------------------------
  # 7. Markdownlint — Markdown-Qualität
  # ---------------------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.json, --fix]
        exclude: |
          (?x)^(
            docs/.*|
            CHANGELOG.md|
            .github/copilot-instructions.md|
            benchmarks/competitive/.*
          )$

  # ---------------------------------------------------------------------------
  # 8. YAML-Lint — YAML-Qualität
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  # ---------------------------------------------------------------------------
  # 9. Prettier — JSON-Formatierung
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '\.json$'
        exclude: '^(models/|audit/|sessions/|logs/|analysis_results/)'

  # ===========================================================================
  # 10. Lokale Hooks — Aurik-spezifische Validierungen
  # ===========================================================================
  - repo: local
    hooks:
      # §2.59 Surgical Repair — Vollständigkeits-Prüfung
      - id: aurik-surgical-check
        name: "§2.59 Surgical Repair — Defekt/Repair-Vollständigkeit"
        entry: .venv_aurik/bin/python scripts/pre_commit_surgical_check.py
        language: system
        pass_filenames: false
        files: ^backend/core/(surgical_defect_analyzer|surgical_repair)\.py$

      # §2.60.2 Denker-Intelligenz-Check
      - id: aurik-denker-intelligence
        name: "§2.60.2 Denker-Intelligenz — Phases, Substitutionen, Budget"
        entry: .venv_aurik/bin/python scripts/pre_commit_denker_intelligence.py
        language: system
        pass_filenames: false
        files: ^backend/core/(phase_effect_catalog|fahrplan)\.py$

      # Keine NotImplementedError-Stubs in Produktion
      - id: no-production-stubs
        name: "Keine NotImplementedError-Stubs in Produktion"
        entry: .venv_aurik/bin/python -m pytest tests/normative/test_no_production_stubs.py -x -q
        language: system
        pass_filenames: false
        files: ^(core|dsp|plugins|backend|denker)/.*\.py$

      # Musical-Goals-Schwellwerte unverändert
      - id: musical-goals-thresholds
        name: "Musical-Goals-Schwellwerte unverändert"
        entry: .venv_aurik/bin/python scripts/check_musical_goals.py
        language: system
        pass_filenames: false
        files: ^backend/core/musical_goals/

      # Aurik VERBOTEN-Regeln
      - id: aurik-compliance
        name: "Aurik VERBOTEN-Regeln (copilot-instructions)"
        entry: .venv_aurik/bin/python scripts/compliance_check.py --errors-only
        language: system
        pass_filenames: false
        files: ^(backend|core|dsp|plugins|denker|Aurik10)/.*\.py$

      # Aurik AST VERBOTEN-Linter (V01-V33)
      - id: aurik-verboten-linter
        name: "Aurik AST VERBOTEN-Linter (V01-V33)"
        entry: bash -c '.venv_aurik/bin/python scripts/aurik_verboten_linter.py --ci 2>&1 | grep -v "spec_constitution" || true'
        language: system
        pass_filenames: false
        files: ^(backend|plugins)/.*\.py$

      # Crossfire-Guard (phase_21/35/42 nie in CAUSE_TO_PHASES)
      - id: aurik-crossfire-guard
        name: "Crossfire-Guard (phase_21/35/42 nie in CAUSE_TO_PHASES)"
        entry: .venv_aurik/bin/python scripts/check_crossfire_phases.py
        language: system
        pass_filenames: false
        files: ^backend/core/causal_defect_reasoner\.py$

      # Stash-Drift-Guard (verhindert Snapshot-Akkumulation)
      - id: aurik-stash-drift-guard
        name: "Stash-Drift-Guard (verhindert Snapshot-Akkumulation)"
        entry: "bash -c 'count=$(git stash list | wc -l); if [ \"$count\" -gt 2 ]; then echo \"WARNUNG: $count Stashes vorhanden. Vor Commit auflösen.\"; exit 1; fi; exit 0'"
        language: system
        pass_filenames: false
        always_run: true

      # Type-Ignore-Reihenfolge (ignore vor Inline-Kommentar)
      - id: aurik-type-ignore-order
        name: "mypy type-ignore Reihenfolge"
        entry: .venv_aurik/bin/python scripts/check_type_ignore_order.py backend plugins Aurik10 cli scripts
        language: system
        pass_filenames: false
        files: ^(backend|plugins|Aurik10|cli|scripts)/.*\.py$

      # Mypy Real-Bug-Gate
      - id: aurik-mypy-real-bug-gate
        name: "Mypy Real-Bug-Gate (alle Layer)"
        entry: .venv_aurik/bin/python scripts/check_mypy_real_bugs.py
        language: system
        pass_filenames: false
        files: ^(backend|plugins|Aurik10|cli)/.*\.py$

      # Format-String-Guard (logger %s-Anzahl == Argument-Anzahl)
      - id: aurik-format-string-guard
        name: "Format-String-Guard (logger %s == args)"
        entry: .venv_aurik/bin/python scripts/compliance/check_format_strings.py
        language: system
        pass_filenames: true
        files: ^(backend|Aurik10)/.*\.py$

      # ContractValidator (Cross-Module Defect/Phase-Konsistenz)
      - id: aurik-contract-validator
        name: "ContractValidator (Defect/Phase-Konsistenz)"
        entry: .venv_aurik/bin/python scripts/compliance/check_contracts.py
        language: system
        pass_filenames: false
        always_run: true

      # Import-Breaking-Change (kritische Exports erhalten)
      - id: aurik-import-breaking
        name: "Import-Breaking-Change (kritische Exports)"
        entry: .venv_aurik/bin/python scripts/compliance/check_import_breaking.py
        language: system
        pass_filenames: true
        files: ^backend/core/(quality_mode|defect_manifest|phase_pruner|safe_dict|periodic_health)\.py$

      # Anti-Regression-Gate (alle 12 Bug-Muster)
      - id: aurik-anti-regression
        name: "Anti-Regression-Gate (alle 12 Bug-Muster)"
        entry: .venv_aurik/bin/python scripts/compliance/anti_regression_gate.py
        language: system
        pass_filenames: true

      # §v10.50 Subprocess-Vertrag (§V34): sys.executable in Orchestratoren
      - id: aurik-sys-executable-guard
        name: "§v10.50 Subprocess-Vertrag (§V34): sys.executable in Orchestratoren"
        entry: .venv_aurik/bin/python scripts/compliance/check_sys_executable.py
        language: system
        pass_filenames: false
        files: ^scripts/.*\.py$

      # Version-Consistency (kein Aurik 8.0/9.x in Logs)
      - id: aurik-version-consistency
        name: "Version-Consistency (kein Aurik 8.0/9.x)"
        entry: "bash -c '! grep -rn \"Aurik [0-9]\\.[0-9]\" backend/ Aurik10/ --include=\"*.py\" | grep -v \"10\\.\" | grep -v \"# \" | grep -v \"CLAUDE\" | grep -v \"CHANGELOG\" | grep -v \"specs/\"'"
        language: system
        pass_filenames: false
        files: ^(backend|Aurik10)/.*\.py$

      # Static-Value-Guard (v10: keine blinden statischen Werte)
      - id: aurik-static-value-guard
        name: "Static-Value-Guard (v10: keine blinden statischen Werte)"
        entry: .venv_aurik/bin/python scripts/pre_commit_static_guard.py --all
        language: system
        pass_filenames: true
        files: ^(backend|Aurik10)/.*\.py$

      # §v10.50 Calibration-Guard (erzwingt §V25-V28, §G76-G81)
      - id: aurik-calibration-guard
        name: "§v10.50 Calibration-Guard (§V25-V28, §G76-G81)"
        entry: .venv_aurik/bin/python scripts/pre_commit_calibration_guard.py
        language: system
        pass_filenames: false
        files: ^(backend|denker)/.*\.py$

      # §v10.51 Sprache-Guard (erzwingt deutsche Log-Meldungen)
      - id: aurik-language-guard
        name: "§v10.51 Sprache-Guard (deutsche Logs)"
        entry: .venv_aurik/bin/python scripts/pre_commit_language_guard.py
        language: system
        pass_filenames: false
        files: ^(backend|denker|Aurik10)/.*\.py$

      # Conventional Commits Message Validation
      - id: conventional-commit-msg
        name: "Conventional Commits (feat/fix/docs/style/refactor/perf/test/chore/spec/build/ci)"
        entry: '^(feat|fix|docs|style|refactor|perf|test|chore|spec|build|ci)(\([^)]+\))?: .{10,}'
        language: pygrep
        stages: [commit-msg]
        args: [--negate]
        pass_filenames: false
        always_run: true
